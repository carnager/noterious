name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Install frontend dependencies
        run: npm ci

      - name: Verify embedded UI assets are up to date
        run: npm run verify:ui

      - name: Run frontend tests
        run: npm test

      - name: Run Go tests
        run: go test ./...

      - name: Build server
        run: go build -o noterious ./cmd/noterious
